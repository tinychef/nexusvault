name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Validate ──────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check && cargo test

  # ── 2. Build cross-platform ──────────────────────────────────────────────────
  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nexusvault_*.AppImage
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: nexusvault_*.dmg
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: nexusvault_*_aarch64.dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexusvault_*.msi

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CARGO_BUILD_JOBS: 2
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NexusVault ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | nexusvault_*.msi |
            | macOS (Intel) | nexusvault_*_x64.dmg |
            | macOS (Apple Silicon) | nexusvault_*_aarch64.dmg |
            | Linux (AppImage) | nexusvault_*.AppImage |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ── 3. Deploy sync Worker ────────────────────────────────────────────────────
  deploy-worker:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Worker deps
        working-directory: workers
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

  # ── 4. Publish release ───────────────────────────────────────────────────────
  publish:
    needs: [build, deploy-worker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find(r => r.draft && r.tag_name === context.ref.replace('refs/tags/', ''));
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
              });
              console.log(`Published release: ${draft.html_url}`);
            }
